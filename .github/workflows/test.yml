name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # Setup
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Neovim stable
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Clone plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim.git .deps/plenary.nvim

      # ------------------------------------------------------------------
      # Run tests (find fallback — no fd installed yet)
      # ------------------------------------------------------------------
      - name: Run tests (find fallback)
        run: make test

      # ------------------------------------------------------------------
      # Install fd and re-run tests to exercise the fd fast-path scanner
      # ------------------------------------------------------------------
      - name: Install fd-find
        run: sudo apt-get update -y && sudo apt-get install -y fd-find

      - name: Run tests (fd fast path)
        run: make test
